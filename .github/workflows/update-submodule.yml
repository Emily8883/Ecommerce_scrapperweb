name: Update Submodule (Daily Sync)

on:
  schedule:
    - cron: "0 3 * * *"  # Midnight São Paulo time
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update submodule to latest remote commit
        run: git submodule update --remote --recursive

      - name: Commit changes if updated
        run: |
          if git diff --quiet; then
            echo "No updates"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Multi-Fragmented-ZipFile-Extractor
          git commit -m "CHORE: Auto-update submodule (daily sync)"
          git push